<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSONL Viewer - Local Offline Copy</title>
<meta name="description" content="Local offline JSONL viewer. Paste or upload .jsonl files to view, format, filter, and explore JSON Lines data with syntax highlighting. All data stays in your browser.">
<meta name="theme-color" content="#007ACC">
<meta name="application-name" content="JSONL Viewer">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="JSONL Viewer">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./assets/icon-192.png">
<!-- Local copy fetched from https://tasks.hamsterbase.com/jsonl-viewer/ on 2026-04-09. -->
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --surface-2: #F3F3F3;
    --surface-3: #E8E8E8;
    --border: #E0E0E0;
    --border-focus: #0078D4;
    --text: #1E1E1E;
    --text-muted: #616161;
    --text-dim: #ABABAB;
    --accent: #0078D4;
    --accent-hover: #106EBE;
    --green: #098658;
    --amber: #B5632B;
    --red: #CD3131;
    --purple: #AF00DB;
    --blue: #0451A5;
    --sidebar: #F8F8F8;
    --activitybar: #2C2C2C;
    --statusbar: #007ACC;
    --tab-active-bg: #FFFFFF;
    --tab-inactive-bg: #ECECEC;
    --selection: rgba(0, 120, 212, 0.08);
    --mono: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 0px;
    --radius-sm: 3px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--surface-2);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Title bar */
  .titlebar {
    background: var(--activitybar);
    color: #CCCCCC;
    padding: 0 16px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }

  .titlebar-title {
    opacity: 0.8;
    font-size: 11px;
  }

  .titlebar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .titlebar-right a {
    color: #CCCCCC;
    text-decoration: none;
    opacity: 0.7;
    font-size: 11px;
    transition: opacity 0.15s;
  }

  .titlebar-right a:hover { opacity: 1; }

  .titlebar-privacy {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    opacity: 0.6;
  }

  .titlebar-privacy svg { flex-shrink: 0; }

  .btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 400;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.1s ease;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    height: 24px;
  }

  .btn:hover {
    background: var(--surface-2);
    color: var(--text);
  }

  .expand-btn {
    width: 90px;
    justify-content: center;
  }

  /* Toggle switch */
  .toggle-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .toggle-switch {
    position: relative;
    width: 28px;
    height: 16px;
    cursor: pointer;
  }

  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--surface-3);
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    left: 2px;
    top: 2px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: all 0.2s;
  }

  .toggle-switch input:checked + .toggle-slider {
    background: var(--accent);
    border-color: var(--accent);
  }

  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(12px);
    background: white;
  }

  /* Main layout */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* Editor panels */
  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .panel:last-child { border-right: none; }

  .panel-tab-bar {
    background: var(--tab-inactive-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    height: 35px;
    flex-shrink: 0;
  }

  .panel-tab {
    padding: 0 16px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--tab-inactive-bg);
    border-right: 1px solid var(--border);
    position: relative;
  }

  .panel-tab.active {
    background: var(--tab-active-bg);
    color: var(--text);
    border-bottom: 1px solid var(--tab-active-bg);
    margin-bottom: -1px;
  }

  .panel-tab.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--accent);
  }

  .panel-tab-icon {
    width: 14px;
    height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel-tools {
    margin-left: auto;
    display: flex;
    align-items: center;
    padding-right: 8px;
    gap: 4px;
  }

  .panel-body {
    flex: 1;
    overflow: auto;
    position: relative;
    background: var(--surface);
  }

  /* Textarea — editor style */
  .input-area {
    width: 100%;
    height: 100%;
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 20px;
    padding: 8px 16px 8px 56px;
    resize: none;
    outline: none;
    tab-size: 2;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }

  .input-area.no-wrap {
    white-space: pre;
    overflow-wrap: normal;
    overflow-x: auto;
  }

  .input-area::placeholder { color: var(--text-dim); }

  /* Drop zone */
  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 120, 212, 0.05);
    border: 2px dashed var(--accent);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }

  .drop-overlay.active { display: flex; }

  .drop-overlay-text {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    background: var(--surface);
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--accent);
  }

  /* Filter bar */
  .filter-toggle-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0, 120, 212, 0.08);
  }

  .filter-bar {
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
    background: var(--surface);
  }

  .filter-bar.hidden { display: none; }

  .filter-label {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .filter-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 3px 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    height: 24px;
    transition: border-color 0.1s;
  }

  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text-dim); }

  .filter-close {
    width: 24px;
    height: 24px;
    padding: 0;
    justify-content: center;
  }

  /* JSON syntax — VS Code Light theme */
  .json-key { color: #0451A5; }
  .json-string { color: #A31515; }
  .json-number { color: #098658; }
  .json-boolean { color: #0000FF; }
  .json-null { color: #0000FF; }
  .json-bracket { color: #1E1E1E; }

  .json-nested-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 0px 4px;
    border-radius: 2px;
    background: rgba(0, 120, 212, 0.1);
    color: var(--accent);
    margin-right: 2px;
    vertical-align: middle;
  }

  /* Rendered string block (for \n expansion) */
  .string-rendered {
    color: #A31515;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .string-rendered-wrapper {
    display: inline;
  }

  /* Row items */
  .row-item {
    border-bottom: 1px solid var(--border);
  }

  .row-item:last-child { border-bottom: none; }

  .row-header {
    padding: 4px 16px 4px 0;
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
    min-height: 26px;
  }

  .row-header:hover { background: var(--selection); }

  .row-gutter {
    width: 56px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .row-preview {
    flex: 1;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 20px;
  }

  .row-toggle {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.15s ease;
    flex-shrink: 0;
    margin-left: 8px;
    width: 16px;
    text-align: center;
  }

  .row-item.expanded .row-toggle { transform: rotate(90deg); }
  .row-item.expanded .row-header { background: var(--selection); }

  .row-body {
    display: none;
    padding: 4px 16px 12px 56px;
    overflow-x: auto;
    background: var(--surface);
  }

  .row-item.expanded .row-body { display: block; }
  .row-error .row-preview { color: var(--red); }

  .json-formatted {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 20px;
    white-space: pre;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 40px;
    text-align: center;
  }

  .empty-state h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .empty-state p {
    font-size: 12px;
    color: var(--text-dim);
    max-width: 260px;
    line-height: 1.5;
  }

  /* Status bar — VS Code style */
  .statusbar {
    background: var(--statusbar);
    color: white;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    font-size: 11px;
    flex-shrink: 0;
  }

  .statusbar-left, .statusbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .statusbar-item {
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.9;
  }

  .statusbar a {
    color: white;
    text-decoration: none;
    opacity: 0.9;
  }

  .statusbar a:hover { opacity: 1; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 24px;
    background: var(--activitybar);
    color: #CCCCCC;
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 12px;
    transform: translateY(60px);
    opacity: 0;
    transition: all 0.2s ease;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

  @media (max-width: 900px) {
    .main-layout {
      grid-template-columns: 1fr;
    }
    .panel { min-height: 300px; }
    .privacy-badge span { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Title bar -->
  <div class="titlebar">
    <span class="titlebar-title">JSONL Viewer — View & Explore JSON Lines</span>
    <div class="titlebar-right">
      <span class="titlebar-privacy">
        <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        All data stays in your browser
      </span>
    </div>
  </div>

  <!-- Main -->
  <div class="main-layout">
    <!-- Input -->
    <div class="panel">
      <div class="panel-tab-bar">
        <div class="panel-tab active">
          <span class="panel-tab-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
          </span>
          input.jsonl
        </div>
        <div class="panel-tools">
          <div class="toggle-group" title="Toggle soft word wrap in the input editor (Option+Z)">
            <span>Word wrap</span>
            <label class="toggle-switch">
              <input type="checkbox" id="inputWordWrap" checked onchange="toggleInputWrap()">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <label class="btn" title="Upload .jsonl file">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            Upload
            <input type="file" accept=".jsonl,.ndjson,.json,.txt" hidden onchange="handleFile(event)">
          </label>
          <button class="btn" onclick="clearInput()">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            Clear
          </button>
        </div>
      </div>
      <div class="panel-body" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
        <textarea class="input-area" id="inputArea" placeholder="Paste JSONL data here, one JSON object per line...

Or drag & drop a .jsonl file" spellcheck="false" oninput="debounceProcess()"></textarea>
        <div class="drop-overlay" id="dropOverlay">
          <span class="drop-overlay-text">Drop .jsonl file here</span>
        </div>
      </div>
    </div>

    <!-- Output -->
    <div class="panel">
      <div class="panel-tab-bar">
        <div class="panel-tab active">
          <span class="panel-tab-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
          </span>
          output
        </div>
        <div class="panel-tools">
          <div class="toggle-group" title="Expand escaped newline characters (\\n) into actual line breaks for easier reading">
            <span>Multi-line strings</span>
            <label class="toggle-switch">
              <input type="checkbox" id="renderNewlines" checked onchange="processInput()">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <button class="btn filter-toggle-btn" id="rowFilterToggle" onclick="toggleFilterPanel('rowFilterBar', 'filterInput')" title="Filter JSONL rows">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            Rows
          </button>
          <button class="btn filter-toggle-btn" id="fieldFilterToggle" onclick="toggleFilterPanel('fieldFilterBar', 'fieldFilterInput')" title="Show selected fields only">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/><path d="M8 6v12"/></svg>
            Fields
          </button>
          <button class="btn expand-btn" id="expandCollapseBtn" onclick="toggleExpandAll()">
            <span id="expandLabel">Expand All</span>
          </button>
        </div>
      </div>
      <div class="filter-bar hidden" id="rowFilterBar">
        <svg width="12" height="12" fill="none" stroke="var(--text-dim)" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span class="filter-label">Filter rows</span>
        <input class="filter-input" id="filterInput" placeholder="Text or key:value" oninput="debounceProcess()">
        <button class="btn filter-close" onclick="closeFilterPanel('rowFilterBar', 'filterInput')" title="Clear and close row filter">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="filter-bar hidden" id="fieldFilterBar">
        <svg width="12" height="12" fill="none" stroke="var(--text-dim)" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/><path d="M8 6v12"/></svg>
        <span class="filter-label">Filter fields</span>
        <input class="filter-input" id="fieldFilterInput" placeholder="response, id, meta.cost" oninput="debounceProcess()">
        <button class="btn filter-close" onclick="closeFilterPanel('fieldFilterBar', 'fieldFilterInput')" title="Clear and close field filter">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="panel-body" id="outputBody">
        <div class="empty-state" id="emptyState">
          <h3>No data</h3>
          <p>Paste JSONL on the left or upload a file to view formatted output.</p>
        </div>
        <div id="treeView" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <div class="statusbar-left">
      <span class="statusbar-item" id="statusInfo">Ready</span>
      <span class="statusbar-item" id="rowCount"></span>
    </div>
    <div class="statusbar-right">
      <a href="https://tasks.hamsterbase.com/" target="_blank" rel="noopener">Powered by HamsterBase</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let parsedData = [];
  let allExpanded = false;
  let processTimeout = null;

  function clearInput() {
    document.getElementById('inputArea').value = '';
    processInput();
  }

  function debounceProcess() {
    clearTimeout(processTimeout);
    processTimeout = setTimeout(processInput, 200);
  }

  function getRenderNewlines() {
    return document.getElementById('renderNewlines').checked;
  }

  function toggleInputWrap() {
    const input = document.getElementById('inputArea');
    const enabled = document.getElementById('inputWordWrap').checked;
    input.classList.toggle('no-wrap', !enabled);
    input.setAttribute('wrap', enabled ? 'soft' : 'off');
  }

  function getFilterToggleId(panelId) {
    return panelId === 'rowFilterBar' ? 'rowFilterToggle' : 'fieldFilterToggle';
  }

  function syncFilterToggle(panelId) {
    const panel = document.getElementById(panelId);
    const toggle = document.getElementById(getFilterToggleId(panelId));
    if (panel && toggle) toggle.classList.toggle('active', !panel.classList.contains('hidden'));
  }

  function toggleFilterPanel(panelId, inputId) {
    const panel = document.getElementById(panelId);
    const input = document.getElementById(inputId);
    panel.classList.toggle('hidden');
    syncFilterToggle(panelId);
    if (!panel.classList.contains('hidden')) input.focus();
  }

  function closeFilterPanel(panelId, inputId) {
    const panel = document.getElementById(panelId);
    const input = document.getElementById(inputId);
    input.value = '';
    panel.classList.add('hidden');
    syncFilterToggle(panelId);
    processInput();
  }

  function parseFieldPaths(input) {
    return input.split(',')
      .map(path => path.trim().split('.').map(part => part.trim()).filter(Boolean))
      .filter(path => path.length > 0);
  }

  function getPathValue(obj, path) {
    let current = obj;
    for (const part of path) {
      if (current === null || typeof current !== 'object' || !Object.prototype.hasOwnProperty.call(current, part)) {
        return { found: false };
      }
      current = current[part];
    }
    return { found: true, value: current };
  }

  function setPathValue(target, path, value) {
    let current = target;
    path.forEach((part, index) => {
      if (index === path.length - 1) {
        current[part] = value;
        return;
      }
      if (!current[part] || typeof current[part] !== 'object' || Array.isArray(current[part])) {
        current[part] = {};
      }
      current = current[part];
    });
  }

  function projectFields(data, fieldPaths) {
    if (fieldPaths.length === 0) return data;
    const projected = {};
    fieldPaths.forEach(path => {
      const result = getPathValue(data, path);
      if (result.found) setPathValue(projected, path, result.value);
    });
    return projected;
  }

  function processInput() {
    const raw = document.getElementById('inputArea').value.trim();
    const filter = document.getElementById('filterInput').value.trim().toLowerCase();
    const fieldPaths = parseFieldPaths(document.getElementById('fieldFilterInput').value);

    if (!raw) {
      parsedData = [];
      allExpanded = false;
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('treeView').style.display = 'none';
      document.getElementById('rowCount').textContent = '';
      document.getElementById('statusInfo').textContent = 'Ready';
      return;
    }

    const lines = raw.split('\n').filter(l => l.trim() !== '');
    let errorCount = 0;

    parsedData = lines.map((line, i) => {
      try {
        const obj = JSON.parse(line.trim());
        return { index: i, data: obj, raw: line.trim(), error: null };
      } catch (e) {
        errorCount++;
        return { index: i, data: null, raw: line.trim(), error: e.message };
      }
    });

    let filtered = parsedData;
    if (filter) {
      filtered = parsedData.filter(row => {
        if (row.error) return row.raw.toLowerCase().includes(filter);
        const str = JSON.stringify(row.data).toLowerCase();
        if (filter.includes(':')) {
          const [key, val] = filter.split(':').map(s => s.trim());
          return str.includes(`"${key}"`) && str.includes(val);
        }
        return str.includes(filter);
      });
    }

    const displayData = fieldPaths.length > 0
      ? filtered.map(row => row.error ? row : { ...row, data: projectFields(row.data, fieldPaths) })
      : filtered;

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('treeView').style.display = 'block';

    const statusText = errorCount > 0 ? `${lines.length} lines · ${errorCount} error${errorCount > 1 ? 's' : ''}` : `${lines.length} lines · Valid`;
    document.getElementById('statusInfo').textContent = statusText;
    const rowCountParts = [`${filtered.length} row${filtered.length !== 1 ? 's' : ''}${filter ? ' filtered' : ''}`];
    if (fieldPaths.length > 0) rowCountParts.push('fields selected');
    document.getElementById('rowCount').textContent = rowCountParts.join(' · ');

    renderTreeView(displayData);
  }

  function tryParseJson(str) {
    if (typeof str !== 'string') return null;
    const trimmed = str.trim();
    if ((trimmed.startsWith('{') && trimmed.endsWith('}')) ||
        (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
      try { return JSON.parse(trimmed); } catch (e) { return null; }
    }
    return null;
  }

  function syntaxHighlight(obj, indent = 0, depth = 0) {
    const pad = '  '.repeat(indent);
    const renderNl = getRenderNewlines();

    if (obj === null) return `<span class="json-null">null</span>`;
    if (typeof obj === 'boolean') return `<span class="json-boolean">${obj}</span>`;
    if (typeof obj === 'number') return `<span class="json-number">${obj}</span>`;

    if (typeof obj === 'string') {
      // Try nested JSON
      if (depth < 3) {
        const nested = tryParseJson(obj);
        if (nested !== null) {
          return `<span class="json-nested-badge">JSON</span>${syntaxHighlight(nested, indent, depth + 1)}`;
        }
      }

      // Check for real newlines OR literal \n sequences in the string
      const hasRealNewlines = /[\n\r\t]/.test(obj);
      const hasLiteralEscapes = /\\n|\\r|\\t/.test(obj);

      if (renderNl && (hasRealNewlines || hasLiteralEscapes)) {
        // Step 1: escapeHtml first (safe for HTML)
        let rendered = escapeHtml(obj);
        // Step 2: convert real \n \r \t to actual line breaks / spaces
        rendered = rendered.replace(/\n/g, '\n').replace(/\r/g, '').replace(/\t/g, '    ');
        // Step 3: also convert literal two-char sequences \\n \\t \\r to actual breaks
        rendered = rendered.replace(/\\n/g, '\n').replace(/\\r/g, '').replace(/\\t/g, '    ');
        return `<span class="json-string">&quot;</span><span class="string-rendered">${rendered}</span><span class="json-string">&quot;</span>`;
      }

      // Raw mode: show escape sequences as literal text
      const escaped = escapeHtml(obj)
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '\\r')
        .replace(/\t/g, '\\t');
      return `<span class="json-string">"${escaped}"</span>`;
    }

    if (Array.isArray(obj)) {
      if (obj.length === 0) return `<span class="json-bracket">[]</span>`;
      const items = obj.map(item => `${pad}  ${syntaxHighlight(item, indent + 1, depth)}`).join(',\n');
      return `<span class="json-bracket">[</span>\n${items}\n${pad}<span class="json-bracket">]</span>`;
    }

    if (typeof obj === 'object') {
      const keys = Object.keys(obj);
      if (keys.length === 0) return `<span class="json-bracket">{}</span>`;
      const entries = keys.map(key =>
        `${pad}  <span class="json-key">"${escapeHtml(key)}"</span>: ${syntaxHighlight(obj[key], indent + 1, depth)}`
      ).join(',\n');
      return `<span class="json-bracket">{</span>\n${entries}\n${pad}<span class="json-bracket">}</span>`;
    }

    return String(obj);
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escapeHtmlCompact(str) {
    // For previews: escape HTML and replace control chars with visible representations
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
  }

  function getPreview(row) {
    if (row.error) return `<span style="color:var(--red)">⚠ ${escapeHtml(row.error)}</span>`;
    const keys = Object.keys(row.data);
    const parts = keys.slice(0, 4).map(k => {
      const v = row.data[k];
      const val = typeof v === 'string' ? v : JSON.stringify(v);
      return `<span class="json-key">${escapeHtmlCompact(k)}</span><span class="json-bracket">: </span>${escapeHtmlCompact(String(val).substring(0, 30))}`;
    });
    return parts.join('<span style="color:var(--text-dim)">  ·  </span>') +
      (keys.length > 4 ? `<span style="color:var(--text-dim)"> +${keys.length - 4}</span>` : '');
  }

  function renderTreeView(data) {
    const container = document.getElementById('treeView');
    if (data.length === 0) {
      container.innerHTML = '<div class="empty-state"><h3>No matching rows</h3></div>';
      return;
    }
    container.innerHTML = data.map(row => `
      <div class="row-item ${row.error ? 'row-error' : ''}${allExpanded ? ' expanded' : ''}" id="row-${row.index}">
        <div class="row-header" onclick="toggleRow(${row.index})">
          <span class="row-gutter">${row.index + 1}</span>
          <span class="row-toggle">▶</span>
          <span class="row-preview" style="margin-left:6px;">${getPreview(row)}</span>
        </div>
        <div class="row-body">
          ${row.error
            ? `<span style="color:var(--red);font-family:var(--mono);font-size:13px">${escapeHtml(row.raw)}</span>`
            : `<div class="json-formatted">${syntaxHighlight(row.data)}</div>`
          }
        </div>
      </div>
    `).join('');
  }

  function toggleRow(index) {
    const el = document.getElementById(`row-${index}`);
    if (el) el.classList.toggle('expanded');
    syncExpandState();
  }

  function toggleExpandAll() {
    allExpanded = !allExpanded;
    document.querySelectorAll('.row-item').forEach(el => {
      el.classList.toggle('expanded', allExpanded);
    });
    updateExpandBtn();
  }

  function syncExpandState() {
    const all = document.querySelectorAll('.row-item');
    if (all.length === 0) return;
    const expandedCount = document.querySelectorAll('.row-item.expanded').length;
    allExpanded = expandedCount === all.length;
    updateExpandBtn();
  }

  function updateExpandBtn() {
    document.getElementById('expandLabel').textContent = allExpanded ? 'Collapse All' : 'Expand All';
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    readFile(file);
    e.target.value = '';
  }

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('inputArea').value = e.target.result;
      processInput();
      showToast(`Loaded ${file.name}`);
    };
    reader.readAsText(file);
  }

  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('dropOverlay').classList.add('active');
  }

  function handleDragLeave(e) {
    document.getElementById('dropOverlay').classList.remove('active');
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropOverlay').classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') processInput();
    if (e.altKey && e.key.toLowerCase() === 'z') {
      e.preventDefault();
      const toggle = document.getElementById('inputWordWrap');
      toggle.checked = !toggle.checked;
      toggleInputWrap();
    }
  });

  toggleInputWrap();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch((error) => {
        console.error('Service worker registration failed:', error);
      });
    });
  }
</script>
</body>
</html>
